<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Overcast Scottish sky: pale grey-blue -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#BDD3DE"/>
      <stop offset="60%"  stop-color="#96B8CC"/>
      <stop offset="100%" stop-color="#80AABF"/>
    </linearGradient>
    <!-- Sea: cool Atlantic blue -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3A75AA"/>
      <stop offset="100%" stop-color="#1E4E78"/>
    </linearGradient>
    <!-- Distant hill: lighter, atmospheric -->
    <linearGradient id="farHill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#7E9E80"/>
      <stop offset="100%" stop-color="#5A785C"/>
    </linearGradient>
    <!-- Foreground hillside: rich Scottish green -->
    <linearGradient id="nearHill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4E7D50"/>
      <stop offset="100%" stop-color="#28482A"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="512" height="512" fill="url(#sky)"/>

  <!-- Sea: gentle curved band in the middle distance -->
  <path d="M0,238 C120,230 260,234 400,232 C450,231 484,233 512,234
           L512,264 C484,262 450,260 400,261 C260,263 120,259 0,267 Z"
        fill="url(#sea)"/>

  <!-- Distant hills: sit above and behind the foreground hillside -->
  <path d="M0,268 Q90,250 195,262 Q310,274 415,250 Q465,242 512,248
           L512,286 L0,290 Z"
        fill="url(#farHill)" opacity="0.85"/>

  <!-- Foreground hillside: rolls from left to right, lower on the right -->
  <path d="M0,288 Q52,268 125,280 Q208,296 295,270
           Q372,248 458,262 L512,260 L512,512 L0,512 Z"
        fill="url(#nearHill)"/>

  <!--
    ═══════════════════════════════════════════════════════════
    TURBINES  (5, largest to smallest left → right)
    Each = pole (line) + nacelle (circle) + 3 blades (polygon)
    Blade polygon points: left-base, tip, right-base
    ═══════════════════════════════════════════════════════════
  -->

  <!-- ── T1  hub=(95,136)  base≈(95,275)  blade r=53 ── -->
  <line x1="95" y1="275" x2="95" y2="144" stroke="#EEEEEE" stroke-width="8" stroke-linecap="round"/>
  <g transform="translate(95,144)">
    <polygon points="-8,4  0,-53  8,4"  fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.6" stroke-linejoin="round"/>
    <g transform="rotate(120)">
      <polygon points="-8,4  0,-53  8,4" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.6" stroke-linejoin="round"/>
    </g>
    <g transform="rotate(240)">
      <polygon points="-8,4  0,-53  8,4" fill="#F0F0F0" stroke="#DCDCDC" stroke-width="0.6" stroke-linejoin="round"/>
    </g>
    <circle r="8" fill="#E0E0E0" stroke="#CACACA" stroke-width="1"/>
  </g>

  <!-- ── T2  hub=(200,180)  base≈(200,286)  blade r=41  rot=30° ── -->
  <line x1="200" y1="286" x2="200" y2="187" stroke="#EEEEEE" stroke-width="6" stroke-linecap="round"/>
  <g transform="translate(200,187) rotate(30)">
    <polygon points="-6,3  0,-41  6,3"  fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.5" stroke-linejoin="round"/>
    <g transform="rotate(120)">
      <polygon points="-6,3  0,-41  6,3" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.5" stroke-linejoin="round"/>
    </g>
    <g transform="rotate(240)">
      <polygon points="-6,3  0,-41  6,3" fill="#F0F0F0" stroke="#DCDCDC" stroke-width="0.5" stroke-linejoin="round"/>
    </g>
    <circle r="6" fill="#E0E0E0" stroke="#CACACA" stroke-width="0.8"/>
  </g>

  <!-- ── T3  hub=(288,200)  base≈(288,270)  blade r=29  rot=55° ── -->
  <line x1="288" y1="270" x2="288" y2="207" stroke="#EEEEEE" stroke-width="4.5" stroke-linecap="round"/>
  <g transform="translate(288,207) rotate(55)">
    <polygon points="-4.5,2  0,-29  4.5,2" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.5" stroke-linejoin="round"/>
    <g transform="rotate(120)">
      <polygon points="-4.5,2  0,-29  4.5,2" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.5" stroke-linejoin="round"/>
    </g>
    <g transform="rotate(240)">
      <polygon points="-4.5,2  0,-29  4.5,2" fill="#F0F0F0" stroke="#DCDCDC" stroke-width="0.5" stroke-linejoin="round"/>
    </g>
    <circle r="4.5" fill="#E0E0E0" stroke="#CACACA" stroke-width="0.7"/>
  </g>

  <!-- ── T4  hub=(358,216)  base≈(358,258)  blade r=20  rot=15° ── -->
  <line x1="358" y1="258" x2="358" y2="222" stroke="#EEEEEE" stroke-width="3.2" stroke-linecap="round"/>
  <g transform="translate(358,222) rotate(15)">
    <polygon points="-3.2,1.5  0,-20  3.2,1.5" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.4" stroke-linejoin="round"/>
    <g transform="rotate(120)">
      <polygon points="-3.2,1.5  0,-20  3.2,1.5" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.4" stroke-linejoin="round"/>
    </g>
    <g transform="rotate(240)">
      <polygon points="-3.2,1.5  0,-20  3.2,1.5" fill="#F0F0F0" stroke="#DCDCDC" stroke-width="0.4" stroke-linejoin="round"/>
    </g>
    <circle r="3.2" fill="#E0E0E0" stroke="#CACACA" stroke-width="0.6"/>
  </g>

  <!-- ── T5  smallest, furthest right  hub=(412,230)  base≈(412,258)  blade r=14  rot=75° ── -->
  <line x1="412" y1="258" x2="412" y2="235" stroke="#EEEEEE" stroke-width="2.4" stroke-linecap="round"/>
  <g transform="translate(412,235) rotate(75)">
    <polygon points="-2.2,1  0,-14  2.2,1" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.3" stroke-linejoin="round"/>
    <g transform="rotate(120)">
      <polygon points="-2.2,1  0,-14  2.2,1" fill="#F5F5F5" stroke="#DCDCDC" stroke-width="0.3" stroke-linejoin="round"/>
    </g>
    <g transform="rotate(240)">
      <polygon points="-2.2,1  0,-14  2.2,1" fill="#F0F0F0" stroke="#DCDCDC" stroke-width="0.3" stroke-linejoin="round"/>
    </g>
    <circle r="2.4" fill="#E0E0E0" stroke="#CACACA" stroke-width="0.5"/>
  </g>

</svg>
